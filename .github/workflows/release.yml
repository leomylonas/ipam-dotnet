name: Release

# Triggered whenever a version tag (e.g. v1.2.3) is pushed.
# Produces:
#   • A GitHub Release with auto-generated notes and self-contained binary
#     archives for each supported platform (frontend SPA included).
#   • A Docker image pushed to GHCR tagged with both the version and "latest".
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Job 1: test ──────────────────────────────────────────────────────────────
  # Run both frontend and backend test suites before publishing anything.
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        working-directory: backend
        run: dotnet restore

      - name: Build
        working-directory: backend
        run: dotnet build --no-restore

      - name: Test
        working-directory: backend
        # Exclude MySQL and Postgres suites — those use Testcontainers and require
        # a Docker daemon. Only the SQLite suite runs in CI.
        run: dotnet test --no-build --filter "FullyQualifiedName!~MySql&FullyQualifiedName!~Postgres" --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "backend/**/test-results.trx"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Frontend lint
        working-directory: frontend
        run: pnpm lint

      - name: Frontend typecheck
        working-directory: frontend
        run: pnpm typecheck

      - name: Frontend test
        working-directory: frontend
        run: pnpm test

  # ── Job 2: release ───────────────────────────────────────────────────────────
  # Builds the frontend, then publishes self-contained single-file binaries for
  # every supported platform with the SPA assets bundled in wwwroot/.
  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        include:
          - rid: linux-x64
            archive: tar
          - rid: linux-arm64
            archive: tar
          - rid: win-x64
            archive: zip
          - rid: osx-x64
            archive: tar
          - rid: osx-arm64
            archive: tar

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      # Copy the Vite output into wwwroot so dotnet publish includes it.
      - name: Copy frontend assets into wwwroot
        run: cp -r frontend/dist backend/src/wwwroot

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        working-directory: backend
        run: dotnet restore

      # Publish a self-contained, single-file binary for the matrix RID.
      # PublishSingleFile bundles the runtime and all assemblies into one
      # executable. Trimming is disabled because ASP.NET Core and EF Core rely
      # heavily on reflection and are not trim-compatible without extra effort.
      - name: Publish (${{ matrix.rid }})
        working-directory: backend
        run: |
          dotnet publish src/IpamService.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -o ../publish/${{ matrix.rid }}

      # Archive the published output. Use .zip for Windows, .tar.gz for all others.
      - name: Archive (${{ matrix.rid }}, zip)
        if: matrix.archive == 'zip'
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../ipam-${{ github.ref_name }}-${{ matrix.rid }}.zip .

      - name: Archive (${{ matrix.rid }}, tar)
        if: matrix.archive == 'tar'
        run: |
          tar -czf ipam-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz \
            -C publish/${{ matrix.rid }} .

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.rid }}
          path: ipam-${{ github.ref_name }}-${{ matrix.rid }}.*
          if-no-files-found: error

  # ── Job 3: publish-release ───────────────────────────────────────────────────
  # Downloads all binary archives, creates the GitHub Release with them as
  # assets, then builds and pushes the Docker image.
  publish-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: dist/
          merge-multiple: true

      # Create the GitHub Release and attach every archive as a release asset.
      # generate_release_notes produces a changelog from commits since the last tag.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push with layer caching via the GHA cache backend.
      # Tagged with both the exact version and "latest" for easy pulling.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
